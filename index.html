<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexTrack Mobile OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overscroll-behavior: none; /* Prevents web-style pull-to-refresh */
            background: #000;
        }
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fdfdfd;
            border-radius: 30px;
            overflow: hidden;
        }
        /* Native-style Bottom Sheet */
        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .bottom-sheet.open { transform: translateY(0); }
        
        /* Swipe Animation */
        .expense-item {
            transition: transform 0.2s;
            touch-action: pan-x;
        }
        .delete-reveal {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            background: #ff4757;
            display: flex;
            align-items: center;
            padding: 0 25px;
            color: white;
            font-weight: bold;
            border-radius: 16px;
            z-index: 0;
        }
    </style>
</head>
<body class="p-2">

    <div class="app-container shadow-2xl relative">
        
        <div class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white text-xs font-bold">H</div>
                <span class="font-bold text-slate-800">Hi, Developer</span>
            </div>
            <div id="connection-status" class="text-[10px] bg-emerald-100 text-emerald-600 px-2 py-1 rounded-full font-bold">● SYSTEM LIVE</div>
        </div>

        <div class="px-6 py-4 space-y-6 flex-grow overflow-y-auto no-scrollbar">
            <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white relative overflow-hidden">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Monthly Limit: ₹20,000</p>
                <h2 id="balance" class="text-5xl font-800 mt-2 tracking-tighter">₹0</h2>
                
                <div class="mt-8 flex justify-between items-end">
                    <div class="space-y-1">
                        <p class="text-slate-500 text-[10px] font-bold uppercase">Health Score</p>
                        <p id="health-text" class="text-emerald-400 font-bold">Excellent</p>
                    </div>
                    <button onclick="vibratePhone(50)" class="bg-white/10 p-3 rounded-2xl backdrop-blur-md">📊</button>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest px-2">Timeline</h3>
                <div id="timeline" class="space-y-3">
                    </div>
            </div>
        </div>

        <button onclick="toggleSheet(true)" class="fixed bottom-10 right-8 w-16 h-16 bg-indigo-600 rounded-full shadow-2xl flex items-center justify-center text-white text-3xl transition-transform active:scale-90 z-20">
            +
        </button>

        <div id="sheet" class="bottom-sheet fixed inset-0 z-50 flex flex-col justify-end">
            <div onclick="toggleSheet(false)" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
            <div class="bg-white rounded-t-[3rem] p-10 relative space-y-6">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-2"></div>
                <h3 class="text-2xl font-bold text-center">New Expense</h3>
                
                <div class="space-y-4">
                    <input id="title" type="text" placeholder="Title" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-none text-lg">
                    <input id="amount" type="number" placeholder="₹ Amount" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-none text-lg">
                    <select id="category" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                        <option value="Food">🍱 Food</option>
                        <option value="Transport">🛺 Transport</option>
                        <option value="Shopping">🛍️ Shopping</option>
                    </select>
                    <button onclick="saveItem()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-xl">LOG TRANSACTION</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('native_tracker')) || [];

        function render() {
            const container = document.getElementById('timeline');
            const balance = document.getElementById('balance');
            container.innerHTML = '';
            
            let total = 0;
            data.reverse().forEach((item, index) => {
                total += item.amount;
                const div = document.createElement('div');
                div.className = "relative overflow-hidden rounded-2xl";
                div.innerHTML = `
                    <div class="delete-reveal">Delete</div>
                    <div class="expense-item relative z-10 bg-white p-5 border border-slate-100 flex justify-between items-center" 
                         ontouchstart="handleTouchStart(event)" 
                         ontouchmove="handleTouchMove(event, this, ${item.id})">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl">${getEmoji(item.category)}</span>
                            <div>
                                <p class="font-bold text-slate-800">${item.title}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">${item.category}</p>
                            </div>
                        </div>
                        <p class="font-bold text-slate-800">₹${item.amount}</p>
                    </div>
                `;
                container.appendChild(div);
            });
            balance.innerText = `₹${total}`;
            data.reverse(); // Reset for logic
        }

        function saveItem() {
            const t = document.getElementById('title');
            const a = document.getElementById('amount');
            const c = document.getElementById('category');

            if(!t.value || !a.value) {
                vibratePhone([100, 50, 100]); // Error vibration pattern
                return;
            }

            data.push({ id: Date.now(), title: t.value, amount: parseFloat(a.value), category: c.value });
            localStorage.setItem('native_tracker', JSON.stringify(data));
            
            t.value = ''; a.value = '';
            toggleSheet(false);
            vibratePhone(30); // Success short vibration
            render();
        }

        // --- Native Interactions ---

        function toggleSheet(open) {
            document.getElementById('sheet').classList.toggle('open', open);
        }

        function vibratePhone(pattern) {
            if ("vibrate" in navigator) {
                navigator.vibrate(pattern);
            }
        }

        function getEmoji(cat) {
            return { Food:'🍱', Transport:'🛺', Shopping:'🛍️' }[cat] || '💰';
        }

        // Swipe logic
        let startX = 0;
        function handleTouchStart(e) { startX = e.touches[0].clientX; }
        function handleTouchMove(e, el, id) {
            let moveX = e.touches[0].clientX;
            let diff = startX - moveX;
            if(diff > 50) { 
                el.style.transform = `translateX(-80px)`;
                setTimeout(() => {
                    if(confirm("Delete this?")) {
                        data = data.filter(i => i.id !== id);
                        localStorage.setItem('native_tracker', JSON.stringify(data));
                        render();
                    } else {
                        el.style.transform = `translateX(0)`;
                    }
                }, 300);
            }
        }

        window.onload = render;
    </script>
</body>
</html>
