<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexTrack | Personal Finance OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overscroll-behavior: none; background: #f8fafc; }
        .tap-effect:active { transform: scale(0.96); transition: 0.1s; }
        .sheet-up { transform: translateY(0%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .sheet-down { transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-2 min-h-screen flex flex-col">

    <div id="onboarding" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-10 hidden">
        <div class="text-6xl mb-6 animate-bounce">🚀</div>
        <h2 class="text-3xl font-800 text-slate-900 mb-2">Welcome!</h2>
        <p class="text-slate-400 text-center mb-10">Set up your profile to start tracking like a pro.</p>
        <div class="w-full space-y-4">
            <input id="setup-name" type="text" placeholder="Your Name" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-slate-100 focus:ring-indigo-500">
            <input id="setup-limit" type="number" placeholder="Monthly Limit (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-slate-100 focus:ring-indigo-500">
            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl">GET STARTED</button>
        </div>
    </div>

    <main class="flex-grow flex flex-col bg-white rounded-[2.5rem] shadow-2xl overflow-hidden relative">
        
        <header class="p-6 pb-2 flex justify-between items-center">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Good Day,</p>
                <h1 id="display-name" class="text-2xl font-800 text-slate-900 leading-none">Guest</h1>
            </div>
            <button onclick="toggleSettings(true)" class="p-3 bg-slate-50 rounded-full tap-effect">⚙️</button>
        </header>

        <div class="p-6 flex-grow overflow-y-auto no-scrollbar">
            <div id="status-card" class="bg-slate-900 p-8 rounded-[2rem] text-white space-y-6 transition-all duration-700">
                <div class="flex justify-between items-start">
                    <div>
                        <p id="limit-label" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest italic">Limit: ₹0</p>
                        <h2 id="total-spent" class="text-4xl font-800 mt-1">₹0</h2>
                    </div>
                    <span id="health-tag" class="text-[9px] font-bold px-3 py-1 bg-white/10 rounded-full">HEALTHY</span>
                </div>
                <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden">
                    <div id="bar" class="bg-indigo-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="mt-8 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Transaction Timeline</h3>
                </div>
                <div id="history-container" class="space-y-3 pb-20"></div>
            </div>
        </div>

        <button onclick="toggleEntry(true)" class="fixed bottom-10 right-10 w-16 h-16 bg-indigo-600 text-white text-3xl font-bold rounded-full shadow-2xl tap-effect z-40">+</button>
    </main>

    <div id="entry-drawer" class="fixed inset-0 z-50 sheet-down flex flex-col justify-end pointer-events-none">
        <div onclick="toggleEntry(false)" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm pointer-events-auto"></div>
        <div class="bg-white rounded-t-[3rem] p-10 space-y-6 pointer-events-auto relative">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto -mt-4 mb-6"></div>
            <input id="title" type="text" placeholder="Expense Name" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-none text-lg">
            <input id="amount" type="number" placeholder="₹ Amount" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-none text-lg">
            <select id="category" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold appearance-none">
                <option value="Food">🍱 Food & Dining</option>
                <option value="Transport">🛺 Transport</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Other">✨ Other</option>
            </select>
            <button onclick="addExpense()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-xl tap-effect uppercase">Secure Log</button>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-8 hidden">
        <div class="bg-white w-full rounded-[2.5rem] p-8 space-y-6 text-center">
            <h3 class="text-xl font-bold">Adjust Settings</h3>
            <div class="space-y-4">
                <input id="edit-limit" type="number" placeholder="New Limit" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100">
                <button onclick="updateLimit()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Update Limit</button>
                <button onclick="resetAll()" class="w-full text-red-500 font-bold py-3">Format System (Reset All)</button>
            </div>
            <button onclick="toggleSettings(false)" class="text-slate-400 font-bold text-sm">Close</button>
        </div>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('nextrack_profile')) || { name: "", limit: 0 };
        let history = JSON.parse(localStorage.getItem('nextrack_history')) || [];

        function init() {
            if (!userData.name) {
                document.getElementById('onboarding').classList.remove('hidden');
            } else {
                updateUI();
            }
        }

        function saveProfile() {
            const name = document.getElementById('setup-name').value;
            const limit = document.getElementById('setup-limit').value;
            if(!name || !limit) return;
            userData = { name, limit: parseFloat(limit) };
            localStorage.setItem('nextrack_profile', JSON.stringify(userData));
            document.getElementById('onboarding').classList.add('hidden');
            updateUI();
        }

        function updateUI() {
            document.getElementById('display-name').innerText = `Hello, ${userData.name}`;
            document.getElementById('limit-label').innerText = `Limit: ₹${userData.limit}`;
            
            const list = document.getElementById('history-container');
            list.innerHTML = '';
            
            let total = 0;
            history.forEach(item => {
                total += item.amount;
                const div = document.createElement('div');
                div.className = "bg-slate-50 p-4 rounded-2xl flex justify-between items-center animate-in slide-in-from-bottom duration-300";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-xl">${getEmoji(item.category)}</div>
                        <div><p class="font-bold text-slate-800 text-sm">${item.title}</p></div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-slate-800 text-sm">₹${item.amount}</p>
                        <button onclick="deleteItem(${item.id})" class="text-[9px] text-red-400 font-black uppercase">Remove</button>
                    </div>
                `;
                list.prepend(div);
            });

            document.getElementById('total-spent').innerText = `₹${total}`;
            const perc = (total / userData.limit) * 100;
            const bar = document.getElementById('bar');
            const card = document.getElementById('status-card');
            const tag = document.getElementById('health-tag');

            bar.style.width = `${Math.min(perc, 100)}%`;
            
            if(perc > 90) { 
                card.className = "bg-rose-600 p-8 rounded-[2rem] text-white space-y-6 transition-all duration-700";
                tag.innerText = "CRITICAL"; bar.style.backgroundColor = "white";
            } else if (perc > 60) {
                card.className = "bg-amber-500 p-8 rounded-[2rem] text-white space-y-6 transition-all duration-700";
                tag.innerText = "WARNING"; bar.style.backgroundColor = "white";
            } else {
                card.className = "bg-slate-900 p-8 rounded-[2rem] text-white space-y-6 transition-all duration-700";
                tag.innerText = "HEALTHY"; bar.style.backgroundColor = "#6366f1";
            }
        }

        function addExpense() {
            const t = document.getElementById('title');
            const a = document.getElementById('amount');
            const c = document.getElementById('category');
            if(!t.value || !a.value) return;

            history.push({ id: Date.now(), title: t.value, amount: parseFloat(a.value), category: c.value });
            localStorage.setItem('nextrack_history', JSON.stringify(history));
            t.value = ''; a.value = '';
            toggleEntry(false);
            updateUI();
        }

        function deleteItem(id) {
            history = history.filter(i => i.id !== id);
            localStorage.setItem('nextrack_history', JSON.stringify(history));
            updateUI();
        }

        function updateLimit() {
            const newLim = document.getElementById('edit-limit').value;
            if(!newLim) return;
            userData.limit = parseFloat(newLim);
            localStorage.setItem('nextrack_profile', JSON.stringify(userData));
            toggleSettings(false);
            updateUI();
        }

        function resetAll() {
            if(confirm("Wipe all data and profile?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function toggleEntry(open) {
            const drawer = document.getElementById('entry-drawer');
            drawer.classList.toggle('sheet-down', !open);
            drawer.classList.toggle('sheet-up', open);
        }

        function toggleSettings(open) {
            document.getElementById('settings-modal').classList.toggle('hidden', !open);
        }

        function getEmoji(cat) { return { Food:'🍱', Transport:'🛺', Shopping:'🛍️' }[cat] || '✨'; }

        window.onload = init;
    </script>
</body>
</html>
