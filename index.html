<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTrack Interactive | v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tap-scale:active { transform: scale(0.95); }
        .scroll-hide::-webkit-scrollbar { display: none; }
        @keyframes bounce-in { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-item { animation: bounce-in 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <main class="max-w-md mx-auto p-5 space-y-6">
        
        <header class="flex justify-between items-center py-2">
            <h1 class="text-2xl font-800 text-slate-900 tracking-tight">Analytics</h1>
            <div class="flex gap-2">
                <button onclick="exportData()" class="p-2 bg-white rounded-full shadow-sm border border-slate-100">💾</button>
            </div>
        </header>

        <section id="budget-card" class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl transition-all duration-500">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">Usage This Month</p>
                    <h2 id="total-amount" class="text-4xl font-bold mt-2">₹0</h2>
                </div>
                <div id="status-badge" class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-[10px] font-bold">STABLE</div>
            </div>
            
            <div class="mt-8 space-y-3">
                <div class="w-full bg-white/10 h-3 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-emerald-500 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-[10px] font-bold text-slate-400">
                    <span id="percentage-label">0% USED</span>
                    <span>LIMIT: ₹15,000</span>
                </div>
            </div>
        </section>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 relative">
            <canvas id="expenseChart" class="max-h-[220px]"></canvas>
            <div id="chart-center-text" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-6">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Top Cat</span>
                <span id="top-category" class="text-lg font-bold text-slate-800">-</span>
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto scroll-hide pb-2">
            <button onclick="filterHistory('All')" class="filter-btn active bg-slate-900 text-white px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all">All</button>
            <button onclick="filterHistory('Food')" class="filter-btn bg-white text-slate-500 border border-slate-100 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all">Food</button>
            <button onclick="filterHistory('Transport')" class="filter-btn bg-white text-slate-500 border border-slate-100 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all">Transport</button>
            <button onclick="filterHistory('Shopping')" class="filter-btn bg-white text-slate-500 border border-slate-100 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all">Shopping</button>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
            <div id="form-header" class="flex justify-between items-center">
                <h3 class="font-bold text-slate-800">Quick Record</h3>
                <span id="error-msg" class="text-red-500 text-[10px] font-bold hidden">INVALID AMOUNT</span>
            </div>
            <input id="title" type="text" placeholder="Description" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            <div class="flex gap-3">
                <input id="amount" type="number" placeholder="₹" class="w-1/2 p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                <select id="category" class="w-1/2 p-4 bg-slate-50 rounded-2xl border-none outline-none text-slate-500 font-bold text-xs capitalize">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button onclick="handleAdd()" class="tap-scale w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 transition-all">
                ADD TRANSACTION
            </button>
        </div>

        <div id="history-container" class="space-y-3 pb-10"></div>
    </main>

    <script>
        let expenses = JSON.parse(localStorage.getItem('nextrack_v3')) || [];
        let myChart;
        const BUDGET_LIMIT = 15000;
        let currentFilter = 'All';

        function init() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Food', 'Transport', 'Shopping', 'Bills', 'Other'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: ['#10b981', '#f59e0b', '#ec4899', '#6366f1', '#94a3b8'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('history-container');
            const totalDisplay = document.getElementById('total-amount');
            const budgetBar = document.getElementById('budget-bar');
            const card = document.getElementById('budget-card');
            const badge = document.getElementById('status-badge');
            
            let total = 0;
            const cats = { Food:0, Transport:0, Shopping:0, Bills:0, Other:0 };
            
            list.innerHTML = '';
            
            expenses.forEach(exp => {
                total += exp.amount;
                cats[exp.category] += exp.amount;
            });

            // Filtering Logic
            const filtered = currentFilter === 'All' ? expenses : expenses.filter(e => e.category === currentFilter);
            
            filtered.reverse().forEach(exp => {
                const div = document.createElement('div');
                div.className = "animate-item bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50";
                div.innerHTML = `<div class="flex items-center gap-4">
                    <div class="text-xl">${getEmoji(exp.category)}</div>
                    <div><p class="font-bold text-slate-800 text-sm leading-none">${exp.title}</p><p class="text-[9px] text-slate-400 font-bold mt-1 uppercase">${exp.date}</p></div>
                </div><p class="font-bold text-slate-800 text-sm">₹${exp.amount}</p>`;
                list.appendChild(div);
            });

            // Interactive Budget Updates
            const perc = (total / BUDGET_LIMIT) * 100;
            budgetBar.style.width = `${Math.min(perc, 100)}%`;
            totalDisplay.innerText = `₹${total.toLocaleString('en-IN')}`;
            document.getElementById('percentage-label').innerText = `${Math.round(perc)}% USED`;

            if(perc > 85) {
                card.className = "bg-rose-600 rounded-[2.5rem] p-8 text-white shadow-2xl shadow-rose-200 transition-all duration-500";
                budgetBar.className = "bg-white h-full transition-all duration-1000";
                badge.innerText = "CRITICAL";
                badge.className = "bg-white/20 text-white px-3 py-1 rounded-full text-[10px] font-bold";
            } else if (perc > 50) {
                card.className = "bg-amber-500 rounded-[2.5rem] p-8 text-white shadow-2xl shadow-amber-100 transition-all duration-500";
                badge.innerText = "WARNING";
            } else {
                card.className = "bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl transition-all duration-500";
            }

            // Top Category Logic
            const top = Object.keys(cats).reduce((a, b) => cats[a] > cats[b] ? a : b);
            document.getElementById('top-category').innerText = total > 0 ? top : '-';

            localStorage.setItem('nextrack_v3', JSON.stringify(expenses));
            myChart.data.datasets[0].data = Object.values(cats);
            myChart.update();
        }

        function handleAdd() {
            const t = document.getElementById('title');
            const a = document.getElementById('amount');
            const c = document.getElementById('category');

            if(!t.value || !a.value || a.value <= 0) {
                document.getElementById('error-msg').classList.remove('hidden');
                setTimeout(() => document.getElementById('error-msg').classList.add('hidden'), 2000);
                return;
            }

            expenses.push({
                id: Date.now(),
                title: t.value,
                amount: parseFloat(a.value),
                category: c.value,
                date: new Date().toLocaleDateString('en-IN', {day:'2-digit', month:'short'})
            });

            t.value = ''; a.value = '';
            updateUI();
        }

        function filterHistory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-900', 'text-white');
                btn.classList.add('bg-white', 'text-slate-500');
            });
            event.target.classList.add('bg-slate-900', 'text-white');
            updateUI();
        }

        function getEmoji(cat) {
            return { Food:'🍔', Transport:'🛺', Shopping:'🛍️', Bills:'⚡', Other:'✨' }[cat] || '💰';
        }

        init();
    </script>
</body>
</html>
