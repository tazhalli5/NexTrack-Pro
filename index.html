<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTrack Pro | FinTech Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <h1 class="text-xl font-bold text-indigo-600 tracking-tight">NexTrack <span class="text-slate-400 font-normal italic text-sm">v2.2</span></h1>
        <button onclick="exportData()" class="text-[10px] bg-slate-900 text-white px-3 py-2 rounded-lg font-bold tracking-widest uppercase">Export</button>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Balance Section -->
        <div class="bg-indigo-600 rounded-[2rem] p-8 text-white shadow-2xl shadow-indigo-200 relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-indigo-200 text-xs font-semibold uppercase tracking-[0.2em]">Available Balance</p>
                <h2 id="total-amount" class="text-5xl font-bold mt-2 tracking-tighter">₹0.00</h2>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-indigo-500 rounded-full opacity-20"></div>
        </div>

        <!-- Chart Section with Conditional UI -->
        <div id="chart-card" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 transition-all">
            <h3 class="text-[11px] font-bold text-slate-400 mb-6 uppercase tracking-widest">Spending Analysis</h3>
            <div id="chart-placeholder" class="hidden py-10 text-center flex flex-col items-center justify-center space-y-3">
                <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-2xl text-slate-300">📈</div>
                <p class="text-slate-400 text-sm italic font-medium tracking-tight px-10">Analytics will appear once you add a transaction.</p>
            </div>
            <canvas id="expenseChart" class="max-h-[250px] mx-auto"></canvas>
        </div>

        <!-- Input Form -->
        <div class="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-slate-800 text-lg">Quick Record</h3>
                <span id="error-msg" class="text-red-500 text-[11px] font-bold hidden uppercase tracking-wide">Invalid input detected</span>
            </div>
            
            <input id="title" type="text" placeholder="What did you spend on?" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 border-none placeholder:text-slate-300">
            
            <div class="flex gap-3">
                <input id="amount" type="number" placeholder="Amount (₹)" class="w-1/2 p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 border-none placeholder:text-slate-300">
                <select id="category" class="w-1/2 p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 border-none text-slate-600 font-medium">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <button onclick="handleAdd()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-xl shadow-indigo-100 active:scale-95 transition-transform uppercase text-sm tracking-widest">
                Add Expense
            </button>
        </div>

        <!-- Transaction History -->
        <div>
            <div class="flex justify-between items-center mb-5 px-3">
                <h3 class="font-bold text-slate-800 tracking-tight">History</h3>
                <button onclick="toggleModal(true)" class="text-[10px] text-red-400 font-black uppercase tracking-widest">Clear Records</button>
            </div>
            <div id="history-container" class="space-y-4"></div>
        </div>
    </main>

    <!-- Custom Modern Confirmation Modal -->
    <div id="clear-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs p-8 rounded-[2rem] text-center space-y-6">
            <div class="text-4xl">⚠️</div>
            <h4 class="font-bold text-slate-800 text-xl">Reset History?</h4>
            <p class="text-slate-400 text-sm leading-relaxed font-medium">This action is permanent and cannot be undone.</p>
            <div class="flex gap-3 pt-2">
                <button onclick="toggleModal(false)" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-500 text-sm">Cancel</button>
                <button onclick="clearHistory()" class="flex-1 py-4 bg-red-500 rounded-2xl font-bold text-white text-sm">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('pro_expenses_v2.2')) || [];
        let myChart;

        function initChart() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Food', 'Transport', 'Shopping', 'Bills', 'Other'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: ['#6366f1', '#f59e0b', '#ec4899', '#10b981', '#94a3b8'],
                        borderWidth: 5,
                        borderColor: '#ffffff'
                    }]
                },
                options: { cutout: '75%', plugins: { legend: { display: false } } }
            });
        }

        function updateUI() {
            const list = document.getElementById('history-container');
            const totalDisplay = document.getElementById('total-amount');
            const chartElem = document.getElementById('expenseChart');
            const placeholder = document.getElementById('chart-placeholder');
            
            list.innerHTML = '';
            let total = 0;
            const catTotals = { Food: 0, Transport: 0, Shopping: 0, Bills: 0, Other: 0 };

            // Handle Chart Visibility
            if (expenses.length === 0) {
                chartElem.classList.add('hidden');
                placeholder.classList.remove('hidden');
                list.innerHTML = '<div class="text-center py-8 text-slate-300 italic text-sm">No transactions to show</div>';
            } else {
                chartElem.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }

            expenses.forEach(exp => {
                total += exp.amount;
                catTotals[exp.category] += exp.amount;

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50 active:scale-98 transition-transform";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-xl shadow-inner">${getEmoji(exp.category)}</div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${exp.title}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wide">${exp.date}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-slate-900 text-sm">₹${exp.amount.toLocaleString('en-IN')}</p>
                        <button onclick="deleteItem(${exp.id})" class="text-[9px] text-red-300 font-black uppercase mt-1">Delete</button>
                    </div>
                `;
                list.prepend(card);
            });

            totalDisplay.innerText = `₹${total.toLocaleString('en-IN')}`;
            localStorage.setItem('pro_expenses_v2.2', JSON.stringify(expenses));
            
            myChart.data.datasets[0].data = Object.values(catTotals);
            myChart.update();
        }

        function handleAdd() {
            const titleInput = document.getElementById('title');
            const amountInput = document.getElementById('amount');
            const categoryInput = document.getElementById('category');
            const errorMsg = document.getElementById('error-msg');

            // NEW: Strict validation for non-empty and positive amounts
            if(!titleInput.value || !amountInput.value || parseFloat(amountInput.value) <= 0) {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 2500);
                return;
            }

            expenses.push({
                id: Date.now(),
                title: titleInput.value,
                amount: parseFloat(amountInput.value),
                category: categoryInput.value,
                date: new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })
            });

            updateUI();
            titleInput.value = ''; amountInput.value = '';
        }

        function toggleModal(show) {
            document.getElementById('clear-modal').classList.toggle('hidden', !show);
        }

        function clearHistory() {
            expenses = [];
            updateUI();
            toggleModal(false);
        }

        function deleteItem(id) {
            expenses = expenses.filter(e => e.id !== id);
            updateUI();
        }

        function getEmoji(cat) {
            const map = { Food: '🍱', Transport: '🛺', Shopping: '🛍️', Bills: '⚡', Other: '✨' };
            return map[cat] || '💰';
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(expenses, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "NexTrack_Backup.json"; a.click();
        }

        initChart();
        updateUI();
    </script>
</body>
  </html>
