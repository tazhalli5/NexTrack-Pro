<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTrack | Enterprise Expense Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .custom-shadow { shadow-offset: 0px 10px; shadow-color: rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body>

    <main class="max-w-md mx-auto min-h-screen p-5 space-y-6">
        
        <header class="flex justify-between items-center py-2">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Dashboard</h1>
                <p id="current-date" class="text-xs text-slate-500 font-medium uppercase tracking-tighter"></p>
            </div>
            <button onclick="exportData()" class="bg-white border border-slate-200 p-2 rounded-xl shadow-sm hover:bg-slate-50">
                📥
            </button>
        </header>

        <section class="bg-indigo-600 rounded-[2.5rem] p-7 text-white shadow-2xl shadow-indigo-200">
            <div class="space-y-1">
                <p class="text-indigo-200 text-[10px] font-bold uppercase tracking-widest">Total Spent This Month</p>
                <h2 id="total-amount" class="text-4xl font-bold italic tracking-tighter">₹0.00</h2>
            </div>
            
            <div class="mt-6 space-y-2">
                <div class="flex justify-between text-[10px] font-bold uppercase">
                    <span>Monthly Limit</span>
                    <span>₹20,000</span>
                </div>
                <div class="w-full bg-indigo-500/50 h-2 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <div id="chart-card" class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
            <div id="chart-placeholder" class="hidden text-center py-5">
                <p class="text-slate-400 text-sm italic">Add expenses to see analytics</p>
            </div>
            <canvas id="expenseChart" class="max-h-[220px]"></canvas>
        </div>

        <section class="bg-white p-7 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
            <div class="flex justify-between">
                <h3 class="font-bold text-slate-800">Add Transaction</h3>
                <span id="error-msg" class="text-red-500 text-[10px] font-black uppercase hidden">Invalid Input</span>
            </div>
            <input id="title" type="text" placeholder="Description..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border-none placeholder:text-slate-300">
            <div class="flex gap-3">
                <input id="amount" type="number" placeholder="Amount" class="w-1/2 p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border-none placeholder:text-slate-300">
                <select id="category" class="w-1/2 p-4 bg-slate-50 rounded-2xl border-none outline-none text-slate-500 font-semibold">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button onclick="handleAdd()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-slate-200">
                SAVE TRANSACTION
            </button>
        </section>

        <div class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h3 class="font-bold text-slate-800">Recent Transactions</h3>
                <button onclick="confirmClear()" class="text-[9px] font-black text-slate-400 uppercase tracking-widest hover:text-red-500">Reset</button>
            </div>
            <div id="history-container" class="space-y-3 pb-10"></div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs p-8 rounded-[2rem] text-center space-y-4">
            <h4 class="text-xl font-bold text-slate-800">Clear Records?</h4>
            <p class="text-slate-400 text-sm font-medium">This will permanently delete your local transaction history.</p>
            <div class="flex gap-3 pt-2">
                <button onclick="toggleModal(false)" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-500">No</button>
                <button onclick="clearAll()" class="flex-1 py-3 bg-red-500 rounded-xl font-bold text-white">Yes</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * APPLICATION STATE MANAGEMENT
         * Optimized for local persistence
         */
        let expenses = JSON.parse(localStorage.getItem('nextrack_pro_v3')) || [];
        let myChart;
        const MONTHLY_BUDGET = 20000;

        function init() {
            document.getElementById('current-date').innerText = new Date().toDateString();
            const ctx = document.getElementById('expenseChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Food', 'Transport', 'Shopping', 'Bills', 'Other'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: ['#6366f1', '#f59e0b', '#ec4899', '#10b981', '#94a3b8'],
                        borderWidth: 4, borderColor: '#ffffff'
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
            updateUI();
        }

        /**
         * CORE LOGIC ENGINE
         */
        function updateUI() {
            const list = document.getElementById('history-container');
            const totalDisplay = document.getElementById('total-amount');
            const budgetBar = document.getElementById('budget-bar');
            
            list.innerHTML = '';
            let total = 0;
            const catTotals = { Food: 0, Transport: 0, Shopping: 0, Bills: 0, Other: 0 };

            if(expenses.length === 0) {
                document.getElementById('chart-placeholder').classList.remove('hidden');
                document.getElementById('expenseChart').classList.add('hidden');
            } else {
                document.getElementById('chart-placeholder').classList.add('hidden');
                document.getElementById('expenseChart').classList.remove('hidden');
            }

            expenses.forEach(exp => {
                total += exp.amount;
                catTotals[exp.category] += exp.amount;

                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50";
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-lg">${getEmoji(exp.category)}</div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm leading-none">${exp.title}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">${exp.date}</p>
                        </div>
                    </div>
                    <p class="font-bold text-slate-800 text-sm">₹${exp.amount.toLocaleString('en-IN')}</p>
                `;
                list.prepend(item);
            });

            totalDisplay.innerText = `₹${total.toLocaleString('en-IN')}`;
            const progress = Math.min((total / MONTHLY_BUDGET) * 100, 100);
            budgetBar.style.width = `${progress}%`;
            
            localStorage.setItem('nextrack_pro_v3', JSON.stringify(expenses));
            myChart.data.datasets[0].data = Object.values(catTotals);
            myChart.update();
        }

        function handleAdd() {
            const t = document.getElementById('title');
            const a = document.getElementById('amount');
            const c = document.getElementById('category');
            
            if(!t.value || !a.value || a.value <= 0) {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
                return;
            }

            expenses.push({
                id: Date.now(),
                title: t.value,
                amount: parseFloat(a.value),
                category: c.value,
                date: new Date().toLocaleDateString('en-IN', {day:'2-digit', month:'short'})
            });

            t.value = ''; a.value = '';
            updateUI();
        }

        function getEmoji(cat) {
            return { Food:'🍱', Transport:'🛺', Shopping:'🛍️', Bills:'⚡', Other:'✨' }[cat] || '💰';
        }

        function confirmClear() { document.getElementById('modal').classList.remove('hidden'); }
        function toggleModal(s) { document.getElementById('modal').classList.toggle('hidden', !s); }
        function clearAll() { expenses = []; updateUI(); toggleModal(false); }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(expenses));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "NexTrack_Report.json"); dl.click();
        }

        window.onload = init;
    </script>
</body>
</html>
